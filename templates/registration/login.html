{% extends 'base.html' %}
{% load static %}

{% block content %}
<section style="padding: 6rem 0; background-color: #f1f5f9; min-height: calc(100vh - 160px);" class="flex-center">
    <div class="container" style="max-width: 440px;">
        <div class="card" style="padding: 2.5rem;">
            <div class="text-center mb-4">
                <h1 class="mb-1" style="font-size: 1.75rem;">Welcome Back</h1>
                <p style="color: var(--text-muted);">Secure access to your health reports</p>
            </div>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="username" required class="form-control" placeholder="you@example.com">
                </div>
                <div class="form-group mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" required class="form-control" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">Login to
                    Account</button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="text-xs font-semibold" style="color: var(--text-muted);">OR</span>
                <div class="divider-line"></div>
            </div>

            <a href="/demo-login" class="btn btn-outline btn-demo" style="width: 100%; padding: 0.875rem;">
                <i data-lucide="zap"></i>
                One-Click Demo Login
            </a>

            <p class="text-center mt-4 text-sm" style="color: var(--text-muted);">
                Don't have an account? <a href="/register" class="font-semibold"
                    style="color: var(--primary); text-decoration: none;">Create one now</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
